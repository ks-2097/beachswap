<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 110" width="420" height="110" font-family="'Bricolage Grotesque','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5e3a"/><stop offset="1" stop-color="#ff8e72"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#fff3c4"/><stop offset="0.55" stop-color="#ffb800"/><stop offset="1" stop-color="#ff9e2c"/>
    </radialGradient>
  </defs>
  <!-- ball mark -->
  <g transform="translate(8,15)">
    <circle cx="40" cy="40" r="40" fill="url(#sun)"/>
    <circle cx="40" cy="40" r="40" fill="none" stroke="#fff" stroke-width="0" />
    <clipPath id="b"><circle cx="40" cy="40" r="40"/></clipPath>
    <g clip-path="url(#b)">
      <circle cx="40" cy="40" r="40" fill="url(#coral)"/>
      <path d="M40 0 C 22 26, 22 54, 40 80" fill="none" stroke="#fff" stroke-width="5"/>
      <path d="M40 0 C 58 26, 58 54, 40 80" fill="none" stroke="#fff" stroke-width="5"/>
      <path d="M2 30 H 78 M2 50 H 78" fill="none" stroke="#fff" stroke-width="5"/>
    </g>
    <!-- swap arrows -->
    <g transform="translate(52,52)">
      <circle cx="14" cy="14" r="16" fill="#0487b0"/>
      <path d="M8 10 h9 l-2 -3 M20 18 h-9 l2 3" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8 10 a8 8 0 0 1 12 0 M20 18 a8 8 0 0 1 -12 0" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
    </g>
  </g>
  <!-- wordmark -->
  <text x="108" y="68" font-size="48" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#142a2e">Beach</tspan><tspan fill="#ff5e3a">Swap</tspan>
  </text>
  <text x="110" y="90" font-size="14.5" font-weight="600" letter-spacing="0.5" fill="#6f8a8c" font-family="'Outfit','Segoe UI',sans-serif">Swap your court · don't waste it</text>
</svg>
